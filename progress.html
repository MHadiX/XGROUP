<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>X GROUP | Training Progress</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/x-icon" href="/assets/images/x-group-logo.jpeg">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="brand">
                <a href="index.html" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
                    <img src="assets/images/x-group-logo.jpeg" alt="X GROUP" class="brand-logo">
                    <span class="brand-name" style="color: var(--text-primary);">X GROUP</span>
                </a>
            </div>
            
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>

            <div class="nav-elements" id="nav-elements">
                <ul class="nav-menu">
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="about.html" class="nav-link">About</a></li>
                    <li><a href="progress.html" class="nav-link active">Progress</a></li>
                </ul>
                <div class="nav-actions">
                    <a href="profile.html" class="btn btn-outline nav-link" id="nav-login-btn">Portal Login</a>
                </div>
            </div>
        </div>
    </nav>

    <header class="about-header">
        <div class="container text-center">
            <div class="badge">LIVE METRICS</div>
            <h1 class="hero-title">Cohort <span class="highlight">Performance</span></h1>
            <p class="hero-subtitle centered-subtitle">Tracking the capability and readiness of active recruits based on live TryHackMe operations, Activities, Performance and Tests.</p>
        </div>
    </header>

    <section class="container" style="margin-bottom: 80px;">
        <div class="mock-window">
            <div class="window-header">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span style="color: #94a3b8; font-size: 0.8rem; margin-left: 10px; font-family: var(--font-mono);">thm_leaderboard_sync.sh</span>
            </div>
            
            <div class="window-body" style="padding: 40px;" id="progress-data-container">
                <p class="code-line blink">Fetching live data from secure database...</p>
            </div>
        </div>
    </section>

    <script src="js/ui.js"></script>
    
    <script>
        document.addEventListener("DOMContentLoaded", async () => {
            const container = document.getElementById('progress-data-container');
            
            const sheetId = "199lSNROkokVMpJYxX1kvim--LrqlBZd_rgjhwZQ9trk";
            const gvizUrl = `https://docs.google.com/spreadsheets/d/${sheetId}/gviz/tq?tqx=out:json`;

            try {
                const response = await fetch(gvizUrl);
                const text = await response.text();
                
                const jsonMatch = text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\);/);
                if (!jsonMatch) throw new Error("Invalid data format received.");
                
                const jsonData = JSON.parse(jsonMatch[1]);
                const rows = jsonData.table.rows;
                
                let data = [];
                
                rows.forEach(row => {
                    if (!row.c || !row.c[0] || !row.c[0].v || row.c[0].v === 'Name') return; 
                    
                    let name = row.c[0].v;
                    let thmId = row.c[1] && row.c[1].v ? row.c[1].v : 'N/A';
                    
                    let roomsRaw = row.c[3] && row.c[3].v ? row.c[3].v : 0;
                    let pointsRaw = row.c[4] && row.c[4].v ? row.c[4].v : 0;
                    
                    let rooms = isNaN(roomsRaw) ? 0 : parseInt(roomsRaw);
                    let points = isNaN(pointsRaw) ? 0 : parseInt(pointsRaw);
                    
                    if (points > 0) {
                        data.push({ name, thmId, rooms, points });
                    }
                });

                data.sort((a, b) => b.points - a.points);
                const maxPoints = data.length > 0 ? Math.max(...data.map(d => d.points)) : 0;
                
                container.innerHTML = '';

                data.forEach(student => {
                    const percentage = maxPoints > 0 ? (student.points / maxPoints) * 100 : 0;
                    
                    // --- UPGRADED UI FOR METRICS ---
                    const itemHtml = `
                        <div class="progress-item" style="margin-bottom: 35px;">
                            <div class="progress-info" style="align-items: flex-end; margin-bottom: 12px; flex-wrap: wrap; gap: 10px;">
                                
                                <div class="student-details">
                                    <span class="skill-name" style="display: block; font-size: 1.1rem; margin-bottom: 4px;">
                                        ${student.name}
                                    </span>
                                    <span style="color: var(--text-secondary); font-size: 0.85rem; font-family: var(--font-mono);">
                                        ID: [${student.thmId}]
                                    </span>
                                </div>
                                
                                <div class="student-metrics" style="display: flex; gap: 12px; margin-left: auto;">
                                    <div style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-subtle); padding: 6px 12px; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--text-secondary)" stroke-width="2">
                                            <polygon points="12 2 2 7 12 12 22 7 12 2"></polygon>
                                            <polyline points="2 17 12 22 22 17"></polyline>
                                            <polyline points="2 12 12 17 22 12"></polyline>
                                        </svg>
                                        <span style="font-family: var(--font-mono); font-weight: 600; color: var(--text-primary); font-size: 0.95rem;">
                                            ${student.rooms} <span style="font-size: 0.75rem; color: var(--text-secondary);">ROOMS</span>
                                        </span>
                                    </div>
                                    
                                    <div style="background: rgba(230, 57, 70, 0.08); border: 1px solid rgba(230, 57, 70, 0.3); padding: 6px 12px; border-radius: 6px; display: flex; align-items: center; gap: 8px;">
                                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="var(--brand-red)" stroke-width="2">
                                            <circle cx="12" cy="12" r="10"></circle>
                                            <circle cx="12" cy="12" r="6"></circle>
                                            <circle cx="12" cy="12" r="2"></circle>
                                        </svg>
                                        <span style="font-family: var(--font-mono); font-weight: 600; color: var(--brand-red); font-size: 0.95rem;">
                                            ${student.points} <span style="font-size: 0.75rem; color: var(--brand-red);">PTS</span>
                                        </span>
                                    </div>
                                </div>

                            </div>
                            
                            <div class="progress-track" style="height: 6px; background: rgba(255,255,255,0.05);">
                                <div class="progress-fill" style="width: ${percentage}%; height: 100%; background: var(--brand-red); border-radius: 10px; box-shadow: 0 0 10px rgba(230, 57, 70, 0.4);"></div>
                            </div>
                        </div>
                    `;
                    container.innerHTML += itemHtml;
                });

                if (data.length === 0) {
                     container.innerHTML = `<p class="code-line sys-out">No active metrics found. Awaiting operative data...</p>`;
                }

            } catch (error) {
                console.error("Data Fetch Error: ", error);
                container.innerHTML = `<p class="code-line" style="color: var(--brand-red);">[!] System Error: Unable to establish secure handshake with database. Check console logs.</p>`;
            }
        });
    </script>
</body>
</html>
